# Local PostgreSQL for CivicAI. Copy .env.example → .env, then: pnpm run db:up && pnpm run db:push && pnpm run db:seed
services:
  postgres:
    image: postgres:16-alpine
    container_name: civicai-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: civicai
      POSTGRES_PASSWORD: civicai
      POSTGRES_DB: civicai
    volumes:
      - civicai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civicai -d civicai"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  civicai_pgdata:
