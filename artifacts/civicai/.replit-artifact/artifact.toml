kind = "web"
previewPath = "/"
title = "CivicAI – Smart Civic Issue Reporting"
version = "1.0.0"
id = "artifacts/civicai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18555

[services.development]
run = "pnpm --filter @workspace/civicai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/civicai", "run", "build" ]
publicDir = "artifacts/civicai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18555"
BASE_PATH = "/"
